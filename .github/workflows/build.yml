name: Build and Verify

on:
  push:
    branches:
      - main
      - dev
      - qa
  pull_request:
    branches:
      - main
      - dev
      - qa
  workflow_dispatch:

permissions:
  contents: read
  packages: read

jobs:
  verify-build:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Configure npm for GitHub Packages
        run: |
          npm config set @gran-paso:registry https://npm.pkg.github.com/
          npm config set //npm.pkg.github.com/:_authToken ${GPR_TOKEN}
        env:
          GPR_TOKEN: ${{ secrets.GPR_TOKEN }}

      - name: Install dependencies
        run: npm ci
        env:
          GPR_TOKEN: ${{ secrets.GPR_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.GPR_TOKEN }}

      - name: Run verify build script
        run: |
          chmod +x verify-build.sh
          ./verify-build.sh
        env:
          CI: true

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7
